<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E9E3D5" />
<meta name="description" content="A private, offline wallet for your membership and loyalty cards. Nothing leaves your device." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Wallet — local cards</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-logo">
      <!-- Mirrors the app icon: terracotta back-card, kraft loyalty card, punched keyring hole + barcode. -->
      <svg viewBox="0 0 100 100" width="96" height="96" fill="none">
        <g transform="rotate(-7 50 50)">
          <rect x="34" y="22" width="46" height="31" rx="5" transform="translate(7 -6)" fill="#E0512A"/>
          <rect x="18" y="29" width="59" height="42" rx="6" fill="#F0EADC"/>
          <rect x="18.4" y="29.4" width="58.2" height="41.2" rx="5.6" fill="none" stroke="#1C1A17" stroke-opacity="0.12"/>
          <circle cx="66" cy="37.5" r="4.4" fill="#3826E6"/>
          <g fill="#1C1A17">
            <rect x="25" y="44" width="3" height="18"/><rect x="30" y="44" width="1.6" height="18"/>
            <rect x="34" y="44" width="4.2" height="18"/><rect x="40" y="44" width="2" height="18"/>
            <rect x="44" y="44" width="3" height="18"/><rect x="49" y="44" width="4.6" height="18"/>
            <rect x="56" y="44" width="1.8" height="18"/><rect x="60" y="44" width="3.4" height="18"/>
            <rect x="65.5" y="44" width="2.2" height="18"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="splash-name">Card Wallet</div>
    <div class="splash-dots"><i></i><i></i><i></i></div>
  </div>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="monogram"></div>
        <div>
          <p class="label">Private · Offline</p>
          <h1>Card Wallet</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="iconbtn" id="exportBtn" aria-label="Export backup" title="Export backup"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        <button class="iconbtn" id="importBtn" aria-label="Import backup" title="Import backup"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
        <input type="file" id="importInput" accept="application/json" hidden />
      </div>
    </div>

    <div class="seg" id="seg">
      <button data-mode="stack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="6" rx="2"/><path d="M6 13h12M7 18h10"/></svg>Stack</button>
      <button data-mode="list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>List</button>
    </div>

    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Search cards" autocomplete="off" />
    </div>
    <div class="chips" id="chips"></div>
    <div id="content"></div>
  </div>

  <button class="fab" id="addBtn"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add card</button>

  <div id="modalRoot"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="lib/jsbarcode.min.js"></script>
  <script src="lib/qrcode.min.js"></script>
  <script src="lib/zxing.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      let swReloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swReloaded || !hadController) return;
        swReloaded = true;
        location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
