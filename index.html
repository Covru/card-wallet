<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#E4E1D9" />
<meta name="description" content="A private, offline wallet for your membership and loyalty cards. Nothing leaves your device." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>Card Wallet</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="splash" class="splash">
    <div class="splash-logo">
      <!-- Card-stack mark: matches the app icon. -->
      <svg viewBox="0 0 100 100" width="110" height="110" fill="none">
        <defs>
          <linearGradient id="sCoral" x1="0" y1="0" x2="0.25" y2="1"><stop offset="0" stop-color="#F2885F"/><stop offset="1" stop-color="#DC5E38"/></linearGradient>
          <linearGradient id="sBlue" x1="0" y1="0" x2="0.25" y2="1"><stop offset="0" stop-color="#6E9CEC"/><stop offset="1" stop-color="#3F73CE"/></linearGradient>
          <linearGradient id="sGreen" x1="0" y1="0" x2="0.25" y2="1"><stop offset="0" stop-color="#6FC68A"/><stop offset="1" stop-color="#3F9C64"/></linearGradient>
          <linearGradient id="sChar" x1="0" y1="0" x2="0.4" y2="1"><stop offset="0" stop-color="#2C2833"/><stop offset="1" stop-color="#14121A"/></linearGradient>
          <linearGradient id="sBrass" x1="0" y1="0" x2="0.35" y2="1"><stop offset="0" stop-color="#F6DF98"/><stop offset=".48" stop-color="#CDA659"/><stop offset="1" stop-color="#92702E"/></linearGradient>
        </defs>
        <g transform="translate(50,50) scale(0.98) translate(-50,-55.5)">
          <rect x="20" y="24" width="60" height="30" rx="7" fill="url(#sCoral)"/>
          <rect x="20" y="35" width="60" height="30" rx="7" fill="url(#sBlue)"/>
          <rect x="20" y="46" width="60" height="30" rx="7" fill="url(#sGreen)"/>
          <rect x="20" y="57" width="60" height="30" rx="7" fill="url(#sChar)"/>
          <rect x="28.5" y="62" width="11" height="8" rx="2" fill="url(#sBrass)"/>
          <circle cx="64" cy="66" r="2.4" fill="url(#sBrass)"/>
          <g fill="#ECE9DF">
            <rect x="28.9" y="70.5" width="2.6" height="11" rx="0.3"/><rect x="33.4" y="70.5" width="1.4" height="11" rx="0.3"/><rect x="36.7" y="70.5" width="3.6" height="11" rx="0.3"/><rect x="42.2" y="70.5" width="1.8" height="11" rx="0.3"/><rect x="45.9" y="70.5" width="2.6" height="11" rx="0.3"/><rect x="50.4" y="70.5" width="4" height="11" rx="0.3" fill="url(#sBrass)"/><rect x="56.3" y="70.5" width="1.6" height="11" rx="0.3"/><rect x="59.8" y="70.5" width="3" height="11" rx="0.3"/><rect x="64.7" y="70.5" width="1.9" height="11" rx="0.3"/><rect x="68.5" y="70.5" width="2.6" height="11" rx="0.3"/>
          </g>
        </g>
      </svg>
    </div>
    <div class="splash-name">Card Wallet</div>
    <div class="splash-dots"><i></i><i></i><i></i></div>
  </div>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="monogram"></div>
        <div>
          <h1>Card Wallet</h1>
        </div>
      </div>
      <div class="top-actions">
        <button class="iconbtn" id="exportBtn" aria-label="Export backup" title="Export backup"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
        <button class="iconbtn" id="importBtn" aria-label="Import backup" title="Import backup"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></button>
        <input type="file" id="importInput" accept="application/json" hidden />
      </div>
    </div>

    <div class="seg" id="seg">
      <button data-mode="stack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="6" rx="2"/><path d="M6 13h12M7 18h10"/></svg>Stack</button>
      <button data-mode="list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>List</button>
    </div>

    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Search cards" autocomplete="off" />
    </div>
    <div class="chips" id="chips"></div>
    <div id="content"></div>
  </div>

  <button class="fab" id="addBtn"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add card</button>

  <div id="modalRoot"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="lib/jsbarcode.min.js"></script>
  <script src="lib/qrcode.min.js"></script>
  <script src="lib/zxing.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      const hadController = !!navigator.serviceWorker.controller;
      let swReloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (swReloaded || !hadController) return;
        swReloaded = true;
        location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
