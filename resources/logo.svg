<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0.25" y2="1">
      <stop offset="0" stop-color="#4A35F2"/>
      <stop offset="1" stop-color="#2212B0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.1" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="kraft" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FCFAF3"/>
      <stop offset="0.5" stop-color="#F0EADC"/>
      <stop offset="1" stop-color="#E1D9C4"/>
    </linearGradient>
    <linearGradient id="backcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E5572E"/>
      <stop offset="1" stop-color="#BC4020"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.36" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="hole" cx="0.5" cy="0.35" r="0.7">
      <stop offset="0" stop-color="#160B7A"/>
      <stop offset="1" stop-color="#3422C4"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#ground)"/>
    <rect width="512" height="512" fill="url(#glow)"/>

    <!-- thin sliver of a second card: signals "wallet of cards" without clutter -->
    <g transform="rotate(-7 256 256)">
      <rect x="150" y="120" width="250" height="168" rx="24" fill="url(#backcard)"
            transform="translate(40 -34)"/>
    </g>

    <!-- main loyalty card -->
    <g transform="rotate(-7 256 256)">
      <rect x="96" y="150" width="320" height="226" rx="30" fill="#000" opacity="0.20"
            transform="translate(0 20)"/>
      <rect x="96" y="150" width="320" height="226" rx="30" fill="url(#kraft)"/>
      <rect x="96" y="150" width="320" height="226" rx="30" fill="url(#sheen)"/>
      <rect x="96.5" y="150.5" width="319" height="225" rx="29.5" fill="none"
            stroke="#1C1A17" stroke-opacity="0.10"/>

      <!-- punched keyring hole -->
      <circle cx="356" cy="196" r="24" fill="url(#hole)"/>
      <circle cx="356" cy="196" r="24" fill="none" stroke="#000" stroke-opacity="0.32" stroke-width="2.5"/>
      <circle cx="356" cy="189" r="19" fill="none" stroke="#fff" stroke-opacity="0.20" stroke-width="2.5"/>

      <!-- barcode: few, chunky bars that survive 48px -->
      <g fill="#1C1A17">
        <rect x="132" y="232" width="16" height="96"/>
        <rect x="158" y="232" width="8"  height="96"/>
        <rect x="176" y="232" width="22" height="96"/>
        <rect x="208" y="232" width="10" height="96"/>
        <rect x="228" y="232" width="16" height="96"/>
        <rect x="254" y="232" width="24" height="96"/>
        <rect x="288" y="232" width="9"  height="96"/>
        <rect x="307" y="232" width="18" height="96"/>
        <rect x="335" y="232" width="12" height="96"/>
        <rect x="357" y="232" width="22" height="96"/>
      </g>
    </g>
  </g>
</svg>
